services:
  app:
    build: ./app
    container_name: myapp-springboot
    restart: unless-stopped
    expose:
      - "8277"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1024m -XX:+UseG1GC -Djava.io.tmpdir=/tmp"

  nginx:
    image: nginx:alpine
    container_name: myapp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./certbot/www:/var/www/certbot:ro,z
      - ./certbot/conf:/etc/letsencrypt:ro,z
    depends_on:
      - app

  certbot:
    image: certbot/certbot:latest
    container_name: myapp-certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw,z
      - ./certbot/conf:/etc/letsencrypt:rw,z 
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --webroot --webroot-path=/var/www/certbot; sleep 12h & wait $${!}; done"
