events {}

http {

    client_max_body_size 30M;

    server {
        listen 80;
        server_name shinjukujunfukuinkyokainasb1995.co.uk;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name shinjukujunfukuinkyokainasb1995.co.uk;

        ssl_certificate /etc/letsencrypt/live/shinjukujunfukuinkyokainasb1995.co.uk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shinjukujunfukuinkyokainasb1995.co.uk/privkey.pem;

        location / {
           proxy_pass http://app:8277;
           proxy_request_buffering off;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_set_header X-Forwarded-Proto https;
           proxy_set_header X-Forwarded-Port 443;
           proxy_set_header X-Forwarded-Host $host;
           proxy_read_timeout 300s;
        } 
    }

}
