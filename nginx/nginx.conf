events {}
http {
    # MIME タイプ判定(これが無いと .js が text/plain になり SPA が真っ白になる)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 30M;

    server {
        listen 80;
        server_name shinjukujunfukuinkyokainasb1995.co.uk;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name shinjukujunfukuinkyokainasb1995.co.uk;
        ssl_certificate /etc/letsencrypt/live/shinjukujunfukuinkyokainasb1995.co.uk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shinjukujunfukuinkyokainasb1995.co.uk/privkey.pem;

        # ===== フロント(Vue SPA)を nginx が配信 =====
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;   # Vue Router history mode 用(必須)
        }

        # ===== /api だけ Spring コンテナへ中継 =====
        location /api/ {
            proxy_pass http://app:8277/;
            proxy_request_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_read_timeout 300s;
        }
    }
}
